site_name: SmartHome Documentation
theme: readthedocs
markdown_extensions:
  - md_in_html
  - plantuml_markdown
plugins:
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
  - swagger-ui-tag:
      docExpansion: "list"
      syntaxHighlightTheme: "monokai"
      supportedSubmitMethods: ["get", "post", "put", "patch", "delete"]